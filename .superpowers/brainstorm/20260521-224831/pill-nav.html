<h2>一体药丸导航按钮</h2>
<p class="subtitle">前进后退按钮合并，半透明分隔线</p>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">

          </div>

        </div>
        <div style="position: absolute; top: 15px; left: 15px; background: rgba(25, 118, 210, 0.9); backdrop-filter: blur(10px); border-radius: 25px; padding: 6px 10px; display: flex; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.2); cursor: grab;">

      </div>
    </div>

        <div style="position: absolute; bottom: 15px; left: 15px; cursor: grab;">

<div class="section" style="margin-top: 20px;">
  <p><strong>设计说明：</strong></p>
  <ul>
    <li>前进后退按钮：药丸形状，半透明分隔线</li>

    <li>主页按钮：圆形，左下角</li>
