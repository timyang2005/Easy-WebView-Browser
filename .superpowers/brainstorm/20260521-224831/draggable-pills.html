<h2>可拖动药丸按钮</h2>
<p class="subtitle">前进后退按钮一体化，所有按钮可拖动</p>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
  <div class="mockup">
    <div class="mockup-header">首次启动 - 输入网址</div>
    <div class="mockup-body">
      <div style="background: white; min-height: 300px; position: relative; display: flex; align-items: center; justify-content: center;">
        <div style="text-align: center; width: 80%;">
          <h2 style="color: #1976D2; margin-bottom: 20px;">WebView 浏览器</h2>
          <div style="background: #f5f5f5; padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <input type="text" placeholder="输入网址..." style="width: 100%; border: none; outline: none; font-size: 16px; background: transparent; text-align: center;">
          </div>
          <button style="margin-top: 15px; padding: 12px 40px; background: #1976D2; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer;">访问</button>
        </div>
        <div style="position: absolute; top: 15px; left: 15px; background: rgba(224, 234, 255, 0.95); backdrop-filter: blur(10px); border-radius: 25px; padding: 6px; display: flex; gap: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: grab;">
          <button style="background: transparent; border: none; color: #1976D2; width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer;">←</button>
          <button style="background: transparent; border: none; color: #1976D2; width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer;">→</button>
        </div>
        <div style="position: absolute; top: 15px; right: 15px; background: rgba(25, 118, 210, 0.9); backdrop-filter: blur(10px); border-radius: 50%; padding: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); cursor: grab;">
          <button style="background: transparent; border: none; color: white; width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer;">↻</button>
        </div>
        <div style="position: absolute; bottom: 15px; left: 15px; background: rgba(25, 118, 210, 0.9); backdrop-filter: blur(10px); border-radius: 50%; padding: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); cursor: grab;">
          <button style="background: transparent; border: none; color: white; width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer;">⌂</button>
        </div>
      </div>
    </div>
  </div>
  <div class="mockup">
    <div class="mockup-header">浏览网页时</div>
    <div class="mockup-body">
      <div style="background: #f5f5f5; min-height: 300px; position: relative;">
        <div style="padding: 20px; color: #333;">
          <h3>网页标题</h3>
          <p>网页内容区域...</p>
          <p>全屏显示，无地址栏</p>
        </div>
        <div style="position: absolute; top: 15px; left: 15px; background: rgba(224, 234, 255, 0.95); backdrop-filter: blur(10px); border-radius: 25px; padding: 6px; display: flex; gap: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: grab;">
          <button style="background: transparent; border: none; color: #1976D2; width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer;">←</button>
          <button style="background: transparent; border: none; color: #1976D2; width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer;">→</button>
        </div>
        <div style="position: absolute; top: 15px; right: 15px; background: rgba(25, 118, 210, 0.9); backdrop-filter: blur(10px); border-radius: 50%; padding: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); cursor: grab;">
          <button style="background: transparent; border: none; color: white; width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer;">↻</button>
        </div>
        <div style="position: absolute; bottom: 15px; left: 15px; background: rgba(25, 118, 210, 0.9); backdrop-filter: blur(10px); border-radius: 50%; padding: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); cursor: grab;">
          <button style="background: transparent; border: none; color: white; width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer;">⌂</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="section" style="margin-top: 20px;">
  <p><strong>设计说明：</strong></p>
  <ul>
    <li>前进后退按钮：浅蓝色底色药丸，形成一体</li>
    <li>刷新按钮：蓝色圆形，右上角</li>
    <li>主页按钮：蓝色圆形，左下角</li>
    <li>所有按钮可拖动到任意位置</li>
    <li>毛玻璃背景效果</li>
  </ul>
</div>
